<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a5298" />
      <stop offset="100%" stop-color="#1e3c72" />
    </linearGradient>
    <!-- Snow Gradient -->
    <linearGradient id="snowGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0eaf5" />
    </linearGradient>
    <!-- Shadow Gradient -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.3)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
  </defs>

  <!-- Sky Background -->
  <rect width="500" height="500" fill="url(#bgGlow)" />

  <!-- Moon/Glow -->
  <circle cx="400" cy="100" r="40" fill="#ffefb5" opacity="0.9" />

  <!-- Twinkling Stars -->
  <circle cx="80" cy="80" r="3" fill="#fff" opacity="0.8" />
  <circle cx="150" cy="150" r="2" fill="#fff" opacity="0.5" />
  <circle cx="300" cy="50" r="4" fill="#fff" opacity="0.9" />
  <circle cx="230" cy="200" r="2" fill="#fff" opacity="0.6" />
  <circle cx="450" cy="220" r="3" fill="#fff" opacity="0.7" />
  
  <!-- Snowflakes -->
  <circle cx="100" cy="250" r="4" fill="#fff" opacity="0.9" />
  <circle cx="200" cy="100" r="5" fill="#fff" opacity="0.8" />
  <circle cx="400" cy="300" r="4" fill="#fff" opacity="0.7" />
  <circle cx="50" cy="350" r="6" fill="#fff" opacity="0.8" />
  <circle cx="280" cy="270" r="3" fill="#fff" opacity="0.6" />

  <!-- Ground -->
  <ellipse cx="250" cy="450" rx="350" ry="100" fill="url(#snowGlow)" />

  <!-- Pine Tree Left -->
  <g transform="translate(60, 260)">
    <polygon points="50,0 100,100 0,100" fill="#2d5e3c" />
    <polygon points="50,30 90,110 10,110" fill="#36734a" />
    <rect x="40" y="110" width="20" height="30" fill="#5c4033" />
    <!-- Snow on tree -->
    <polygon points="50,0 70,40 30,40" fill="#fff" opacity="0.8" />
  </g>

  <!-- Pine Tree Right -->
  <g transform="translate(350, 240) scale(0.8)">
    <polygon points="50,0 100,100 0,100" fill="#2d5e3c" />
    <polygon points="50,30 90,110 10,110" fill="#36734a" />
    <rect x="40" y="110" width="20" height="30" fill="#5c4033" />
    <polygon points="50,0 70,40 30,40" fill="#fff" opacity="0.8" />
  </g>

  <!-- Snowman Base Shadow -->
  <ellipse cx="250" cy="420" rx="60" ry="15" fill="url(#shadow)" />

  <!-- Snowman Body -->
  <circle cx="250" cy="350" r="70" fill="#ffffff" />
  <circle cx="250" cy="240" r="50" fill="#ffffff" />
  <circle cx="250" cy="150" r="40" fill="#ffffff" />

  <!-- Buttons -->
  <circle cx="250" cy="210" r="5" fill="#333" />
  <circle cx="250" cy="240" r="5" fill="#333" />
  <circle cx="250" cy="270" r="5" fill="#333" />
  <circle cx="250" cy="330" r="6" fill="#333" />
  <circle cx="250" cy="370" r="6" fill="#333" />

  <!-- Scarf -->
  <path d="M 210,180 Q 250,200 290,180 L 290,195 Q 250,215 210,195 Z" fill="#e63946" />
  <path d="M 260,190 Q 280,240 285,260 L 265,265 Q 250,230 250,195 Z" fill="#e63946" />

  <!-- Face -->
  <circle cx="235" cy="140" r="4" fill="#333" />
  <circle cx="265" cy="140" r="4" fill="#333" />
  <polygon points="250,145 280,155 250,160" fill="#f4a261" /> <!-- Carrot Nose -->
  
  <!-- Smile -->
  <path d="M 235,165 Q 250,175 265,165" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round" />
  <circle cx="230" cy="155" r="5" fill="#ffb6b9" opacity="0.6" /> <!-- Blush -->
  <circle cx="270" cy="155" r="5" fill="#ffb6b9" opacity="0.6" />

  <!-- Hat -->
  <rect x="210" y="105" width="80" height="15" fill="#333" rx="5" />
  <rect x="225" y="55" width="50" height="55" fill="#333" />
  <rect x="225" y="95" width="50" height="10" fill="#e63946" />

  <!-- Arms -->
  <path d="M 205,230 Q 160,200 130,210" fill="none" stroke="#5c4033" stroke-width="5" stroke-linecap="round" />
  <path d="M 160,212 Q 150,190 145,185" fill="none" stroke="#5c4033" stroke-width="4" stroke-linecap="round" />
  
  <path d="M 295,230 Q 340,200 370,210" fill="none" stroke="#5c4033" stroke-width="5" stroke-linecap="round" />
  <path d="M 340,212 Q 350,190 355,185" fill="none" stroke="#5c4033" stroke-width="4" stroke-linecap="round" />

</svg>
